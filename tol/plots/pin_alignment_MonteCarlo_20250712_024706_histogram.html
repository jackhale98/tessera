<!DOCTYPE html>
<html>
<head>
    <title>Monte Carlo Analysis: pin alignment</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .stats { 
            background: #f5f5f5; 
            padding: 15px; 
            margin: 20px 0; 
            border-radius: 5px; 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #2196F3; }
        .stat-label { color: #666; }
        svg { border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Monte Carlo Analysis: pin alignment</h1>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">0.1063</div>
                <div class="stat-label">Mean</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">0.0531</div>
                <div class="stat-label">Std Deviation</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">0.126</div>
                <div class="stat-label">Cp</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">0.090</div>
                <div class="stat-label">Cpk</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">N/A</div>
                <div class="stat-label">Samples</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">%</div>
                <div class="stat-label">Confidence</div>
            </div>
        </div>
        
        <div id="histogram"></div>
        
        <div style="margin-top: 20px;">
            <h3>Analysis Details</h3>
            <p><strong>Stackup:</strong> pin alignment</p>
            <p><strong>Analysis Method:</strong> Monte Carlo Simulation</p>
            <p><strong>Distribution Type:</strong> Various (feature-dependent)</p>
        </div>
    </div>
</body>
</html>
